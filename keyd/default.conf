# keyd config — converted from Kanata config.kbd (v3: overloadi + timeout safeguard)
#
# Place this file at:   /etc/keyd/default.conf
# Then run:             sudo keyd reload
#
# ──────────────────────────────────────────────────────────────
# Home-row mod formula
# ──────────────────────────────────────────────────────────────
#   a = overloadi( a, timeout( overloadt2(<mod>, a, 200), 500, a ), 125 )
#
# Three safeguards stacked:
#
# (1) overloadi(..., 125)
#     If the last non-action key was pressed less than 125ms ago, skip
#     everything and just type the letter. Prevents mod misfires during
#     fast typing (e.g., "small" no longer registers l as Ctrl).
#
# (2) timeout(action_A, 500, action_B)
#     If a key event occurs within 500ms, run action_A (the tap-hold).
#     Otherwise run action_B (plain letter). This is a "stuck-mod"
#     safeguard: if you hold a home-row key and then pause for more than
#     500ms, the key commits to being just a letter so a later keypress
#     doesn't accidentally trigger a modifier shortcut.
#
# (3) overloadt2(<mod>, a, 200)
#     Normal tap-hold: quick tap = letter, held past 200ms with an
#     intervening keypress = modifier.
#
# Tuning:
#   - 125 (idle):   raise for safer typing (150-180), lower for snappier mods (100)
#   - 500 (stuck):  raise if you want to hold mods longer, lower for stricter safety
#   - 200 (hold):   raise if mods engage when you don't want them, lower for faster access

[ids]
*

# ──────────────────────────────────────────────────────────────
# Main layer
# ──────────────────────────────────────────────────────────────
[main]

# Row 3 tweaks (p [ ] \   →   p bspc ] ret)
leftbrace = backspace
backslash = enter

# Row 4 — caps → esc, home-row mods with full safeguards
capslock = esc
a = overloadi(a, timeout(overloadt2(alt,     a, 200), 500, a), 125)
s = overloadi(s, timeout(overloadt2(control, s, 200), 500, s), 125)
d = overloadi(d, timeout(overloadt2(shift,   d, 200), 500, d), 125)
f = overloadi(f, timeout(overloadt2(meta,    f, 200), 500, f), 125)
j = overloadi(j, timeout(overloadt2(meta,    j, 200), 500, j), 125)
k = overloadi(k, timeout(overloadt2(shift,   k, 200), 500, k), 125)
l = overloadi(l, timeout(overloadt2(control, l, 200), 500, l), 125)
; = overloadi(;, timeout(overloadt2(alt,     ;, 200), 500, ;), 125)

# Row 5: lsft → -, rsft → =
leftshift  = minus
rightshift = equal

# Bottom row thumbs
leftalt  = layer(arrowKey)
rightalt = layer(symbols)

# ──────────────────────────────────────────────────────────────
# Symbols layer  (held via right alt)
# ──────────────────────────────────────────────────────────────
[symbols]

# Row 3: q..p → ! @ # $ % ^ & * ` ~
q = !
w = @
e = #
r = $
t = %
y = ^
u = &
i = *
o = `
p = ~

# Row 4: a..' → [ { ( _ | \ + ) } ]
a = [
s = {
d = (
f = _
g = |
h = backslash
j = +
k = )
l = }
; = ]
capslock = capslock

# Row 5: z.., → 1 2 3 4 5 6 7 8 9 0
z = 1
x = 2
c = 3
v = 4
b = 5
n = 6
m = 7
, = 8
. = 9
/ = 0

# ──────────────────────────────────────────────────────────────
# ArrowKey layer  (held via left alt)
# ──────────────────────────────────────────────────────────────
[arrowKey]

d = delete
h = left
j = down
k = up
l = right
